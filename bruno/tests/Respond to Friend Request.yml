info:
  name: Respond to Friend Request
  type: http
  seq: 10

http:
  method: POST
  url: "{{base_url}}/functions/v1/respond-friend-request"
  headers:
    - name: apikey
      value: "{{anon_key}}"
    - name: Authorization
      value: Bearer {{access_token}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "request_id": "{{friend_request_id}}",
        "action": "accepted"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Sign in as the recipient before sending this request. Use accepted to create the friendship atomically or rejected to decline without creating one.
